name: Build and test (Maven)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test
        run: mvn -B -ntp clean verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-jar
          path: target/app.jar
          retention-days: 7
          if-no-files-found: ignore
